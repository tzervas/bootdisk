# Bootdisk Documentation Configuration

This configuration file demonstrates how to set up comprehensive automated documentation generation for the bootdisk project using the Documentation Agent and sister projects.

## Overview

The documentation system generates:
- Visual README with screenshots
- Comprehensive API documentation
- Interactive documentation site
- Automated screenshot generation
- Multi-format documentation output

## Configuration Structure

```yaml
# docs-config.yaml
documentation:
  project:
    name: "Bootdisk"
    description: "Automated Debian workstation USB creation"
    version: "1.0.0"
    repository: "https://github.com/agentic/bootdisk"
    author: "Documentation Agent"
    license: "MIT"

  components:
    # Screenshot automation
    docsnap:
      config: "docs/screenshots.yaml"
      output: "docs/assets/screenshots/"
      formats: ["png", "webp"]
      quality: 90

    # General documentation generation
    docugen:
      source:
        - type: "rust"
          path: "src/"
        - type: "python"
          path: "scripts/"
        - type: "yaml"
          path: "bootdisk_schema.yaml"
      templates: "docs/templates/"
      output: "docs/generated/"
      formats: ["markdown", "html"]

    # API documentation
    apidocgen:
      frameworks:
        - type: "rust"
          source: "src/"
          output: "docs/api/rust/"
        - type: "python"
          app: "python/main.py"
          output: "docs/api/python/"
      interactive: true
      sdk_generation: true

    # Documentation site
    docsite:
      framework: "mkdocs"
      config: "mkdocs.yaml"
      theme: "material"
      features:
        - search
        - versioning
        - dark_mode
      deployment:
        target: "github-pages"
        cname: "docs.bootdisk.dev"

  automation:
    triggers:
      - on_push: true
      - on_pull_request: true
      - on_release: true
      - scheduled: "0 2 * * *"  # Daily at 2 AM
    quality_checks:
      - link_validation: true
      - image_optimization: true
      - accessibility_check: true
      - seo_validation: true

  content:
    sections:
      - name: "Getting Started"
        type: "tutorial"
        screenshots: true
        interactive: true
      - name: "Configuration"
        type: "reference"
        source: "bootdisk_schema.yaml"
        screenshots: true
      - name: "API Reference"
        type: "api"
        frameworks: ["rust", "python"]
        interactive: true
      - name: "Contributing"
        type: "guide"
        templates: ["contributing.md.j2"]
```

