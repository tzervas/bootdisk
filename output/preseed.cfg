# Preseed file for Debian installation
d-i debian-installer/locale string en_US.UTF-8
d-i keyboard-configuration/xkb-keymap select us
d-i netcfg/choose_interface select auto
d-i netcfg/get_hostname string workstation
d-i netcfg/get_domain string local
d-i mirror/country string manual
d-i mirror/http/hostname string deb.debian.org
d-i mirror/http/directory string /debian
d-i mirror/suite string trixie
d-i mirror/http/proxy string
d-i clock-setup/utc boolean true
d-i time/zone string UTC
d-i partman-auto/disk string /dev/sda
d-i partman-auto/method string crypto
d-i partman-lvm/device_remove_lvm boolean true
d-i partman-md/device_remove_md boolean true
d-i partman-auto/choose_recipe select custom
d-i partman-auto/expert_recipe string \
  custom :: \
    512 512 512 fat32 \
      $primary{ } $bootable{ } \
      method{ efi } format{ } \
    . \
    100000 100000 100000 ext4 \
      $primary{ } \
      method{ format } format{ } \
      use_filesystem{ } filesystem{ ext4 } \
      mountpoint{ /boot } \
    . \
    100000 100000 100000 btrfs \
      $primary{ } \
      method{ format } format{ } \
      use_filesystem{ } filesystem{ btrfs } \
      mountpoint{ / } \
      options{ compress=zstd } \
    . \
    500000 500000 500000 btrfs \
      $primary{ } \
      method{ format } format{ } \
      use_filesystem{ } filesystem{ btrfs } \
      mountpoint{ /home } \
      options{ compress=zstd } \
    . \
    64000 64000 64000 linux-swap \
      $primary{ } \
      method{ swap } format{ } \
    .
d-i partman-auto/confirm boolean true
d-i partman-crypto/passphrase password passphrase
d-i partman-crypto/passphrase-again password passphrase
d-i passwd/root-password password root
d-i passwd/root-password-again password root
d-i passwd/user-fullname string Workstation User
d-i passwd/username string user
d-i passwd/user-password password password
d-i passwd/user-password-again password password
tasksel tasksel/first multiselect standard, gnome-desktop
d-i pkgsel/include string nala
d-i pkgsel/upgrade select none
d-i grub-installer/only_debian boolean true
d-i grub-installer/with_other_os boolean false
d-i finish-install/reboot_in_progress note
d-i preseed/late_command string \
  in-target apt-get update; \
  in-target apt-get install -y btrfs-progs; \
  in-target mkdir -p /mnt/root_overlay; \
  in-target mount -t overlay overlay -o lowerdir=/,upperdir=/mnt/root_overlay/upper,workdir=/mnt/root_overlay/work /; \
  in-target echo 'overlay / overlay ro 0 0' >> /etc/fstab; \
  in-target systemctl enable systemd-readahead-collect.service; \
  in-target systemctl enable systemd-readahead-replay.service
